name: Publish Wiki

# Auto-publish the GitHub Wiki from the in-repo docs/ folder.
# Docs are authored once in docs/*.md; scripts/build_wiki.py converts them
# into wiki pages and this workflow pushes them to the <repo>.wiki.git repo.
#
# Prerequisite (one-time): the wiki must be initialised once via the GitHub
# UI (create any page and save) so that the <repo>.wiki.git repository exists.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "scripts/build_wiki.py"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wiki pages from docs/
        run: python3 scripts/build_wiki.py --out build/wiki

      - name: Clone the wiki repository
        id: clone
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki_repo

      - name: Wiki not initialised
        if: steps.clone.outcome == 'failure'
        run: |
          echo "::warning::Could not clone the wiki repo. Initialise the wiki once via the"
          echo "::warning::GitHub UI (Wiki tab -> Create the first page -> Save), then re-run."
          exit 1

      - name: Sync generated pages into the wiki checkout
        run: |
          # Remove old generated pages but keep the wiki's .git directory.
          find wiki_repo -maxdepth 1 -name '*.md' -delete
          cp build/wiki/*.md wiki_repo/

      - name: Commit and push wiki
        working-directory: wiki_repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "docs: sync wiki from docs/ @ ${GITHUB_SHA::7}"
            git push
            echo "Wiki updated."
          fi
